<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Background Animation</title>

<style>
*{
    margin:0;
    padding:0;
}

body{
    overflow:hidden;
}

video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
}
</style>

</head>
<body>

<video autoplay muted loop playsinline>
    <source src="video.mp4" type="video/mp4">
</video>

</body>
</html>
